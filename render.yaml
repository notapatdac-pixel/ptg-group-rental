# Render Blueprint — deploys ONLY the Python ML inference service.
# (The Next.js frontend is deployed separately on Vercel, which triggers this
#  service on a schedule via vercel.json cron → /api/cron/ml-run → ML_SERVICE_URL.)
#
# Usage: push this file, then Render → New → Blueprint → pick this repo.
services:
  - type: web
    name: ptg-ml
    runtime: python
    plan: free                 # NOTE: 512MB RAM may OOM with xgboost+sklearn+pandas.
                               # If the build/boot fails, bump to "starter".
    rootDir: agent/ml/service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # The Python service uses its OWN variable names (not the Next.js ones):
      - key: SUPABASE_URL
        sync: false            # = same value as the web app's NEXT_PUBLIC_SUPABASE_URL
      - key: SUPABASE_SERVICE_KEY
        sync: false            # = same value as the web app's SUPABASE_SERVICE_ROLE_KEY

# After this deploys, copy its URL (e.g. https://ptg-ml.onrender.com) and set it
# as ML_SERVICE_URL in your Vercel project's environment variables.
